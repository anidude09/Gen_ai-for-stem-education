[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "construction-circle-detector"
version = "0.1.0"
description = "Circle detection pipeline for construction drawings (Hough + contour + OCR)"
requires-python = ">=3.9"
dependencies = [
    "numpy<2.0.0",
    "opencv-python>=4.8",
    "construction-ocr",
]

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[tool.setuptools.packages.find]
where = ["src"]
