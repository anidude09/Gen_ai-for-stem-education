[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "construction-ocr"
version = "0.1.0"
description = "PaddleOCR wrapper optimized for construction drawings"
requires-python = ">=3.9"
dependencies = [
    "numpy<2.0.0",
    "opencv-python>=4.8",
    "paddleocr",
]

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[tool.setuptools.packages.find]
where = ["src"]
