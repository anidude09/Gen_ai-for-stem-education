[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "construction-llm-explainer"
version = "0.1.0"
description = "LLM explainer module for construction drawings using OpenAI GPT-4o (primary) and Groq Llama (fallback)"
requires-python = ">=3.9"
dependencies = [
    "openai>=1.30.0",
    "groq>=0.9.0"
]

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[tool.setuptools.packages.find]
where = ["src"]
